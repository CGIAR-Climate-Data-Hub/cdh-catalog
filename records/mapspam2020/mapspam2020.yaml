processing:
  - id: source
    description: Original MAPSPAM 2020 v2 release.
    code:
      url: https://github.com/michielvandijk/mapspamc
      version: v0.0.2
    date: "2026-04-22T00:00:00Z"
    derived_from:
      - url: https://dataverse.harvard.edu/dataset.xhtml?persistentId=doi:10.7910/DVN/SWPENT
        title: Source MAPSPAM dataset
  - id: cloud-optimize
    description: Conversion of source MAPSPAM files to a consolidated Zarr data cube.
    code:
      url: "https://github.com/CGIAR-Climate-Data-Hub/cdh-data-pipeline/blob/main/recipes/mapspam2020.py"
      version: "47f9830"
    date: "2026-07-07"

data:
  - name: zarr
    locations:
      - url: https://digital-atlas.s3.amazonaws.com/cdh/data/mapspam2020-v2r2/spam2020-v2r2.zarr
        title: HTTPS
      - url: s3://digital-atlas/cdh/data/mapspam-2020-v2r2/spam2020-v2r2.zarr
        title: S3
    processing_steps: [cloud-optimize]
    description: Zarr representation of the source MAPSPAM files.
    nodata: -9999
    media_type: application/vnd.zarr; version=3
    file_size: 500 MB
  - name: cogs
    locations:
      - url: https://digital-atlas.s3.amazonaws.com/cdh/data/mapspam2020-v2r2/cogs/
        title: HTTPS
      - url: s3://digital-atlas/cdh/data/mapspam-2020-v2r2/cogs/
        title: S3
    href_template: "spam2020-{technology}-{variable}.tif"
    processing_steps: [cloud-optimize]
    description: Cloud Optimized GeoTIFFs of the MAPSPAM files.
    nodata: -9999
    media_type: "image/tiff; application=geotiff; profile=cloud-optimized"

additional_assets:
  - name: crop codes
    locations:
      - url: https://digital-atlas.s3.amazonaws.com/cdh/data/mapspam-2020-v2r2/crop-codes.json
    description: Dimension code list for crop values.
    media_type: application/json
    roles: [metadata, describedby]
    file_size: 5 KB

additional_links:
  - name: MAPSPAM project website
    rel: about
    url: https://www.mapspam.info/about/
    description: Project page describing MAPSPAM methods and releases.
