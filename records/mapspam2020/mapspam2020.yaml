cdh_schema_version: "v0.2.0"
extensions:
  - https://cgiar-climate-data-hub.github.io/cdh-metadata-standard/v0.1.0/extensions/cdh/schema.json
  - https://cgiar-climate-data-hub.github.io/cdh-metadata-standard/v0.1.0/extensions/climate/schema.json
  - https://cgiar-climate-data-hub.github.io/cdh-metadata-standard/v0.1.0/extensions/datacube/schema.json
  - https://cgiar-climate-data-hub.github.io/cdh-metadata-standard/v0.1.0/extensions/agriculture/schema.json

id: spam2020
title: MAPSPAM 2020
version: v2r2
description: >
  Global Spatially-Disaggregated Crop Production Statistics Data for 2020 Version 2.0 Release 2,
  represented as a gridded crop production data cube. The record describes crop area, harvested
  area, production, and yield by crop and production technology at 5 arc-minute resolution.
license: CC-BY-SA-4.0
resource_type: dataset

keywords:
  - food security
  - crop production
  - spatial distribution
  - gridded agriculture
note: >
  Derived from available subnational statistics; local national or subnational data providers may
  hold more precise source statistics for some locations.

contact:
  - name: Zhe Guo
    roles: [producer]
    email: z.guo@cgiar.org
    organization: International Food Policy Research Institute
    url: https://www.ifpri.org/
  - name: Shuang Zhou
    roles: [producer]
    email: s.zhou@cgiar.org
    organization: International Food Policy Research Institute
    url: https://www.ifpri.org/
  - name: Liangzhi You
    roles: [producer]
    organization: International Food Policy Research Institute

  - organization: International Food Policy Research Institute
    roles: [licensor]
    url: https://www.ifpri.org/

citation:
  title:
    Global Spatially-Disaggregated Crop Production Statistics Data for 2020 Version 2.0 Release 2
  authors:
    - International Food Policy Research Institute (IFPRI)
  date: "2026"
  publisher: Harvard Dataverse
doi: 10.7910/DVN/SWPENT
related_publications:
  - citation:
      title: "Generating global crop distribution maps: From census to grid"
      authors:
        - You, L.
        - Wood, S.
        - Wood-Sichra, U.
        - Wu, W.
      date: "2014"
      publisher: Agricultural Systems
    doi: 10.1016/j.agsy.2014.01.002

created: "2026-07-06"
updated: "2026-07-06"

spatial:
  bbox:
    - [-180, -90, 180, 90]
  geography:
    - world
  crs: EPSG:4326
  resolution:
    - type: xy
      unit: degree
      value: 0.08333333
      label: 5 arc-minutes (~10km at equator)

temporal:
  start_date: "2020-01-01"
  end_date: "2020-12-31"
  resolution:
    unit: year
    step: P1Y
    note: Static data for 2020 reference year

dimensions:
  - name: crop
    type: crop
    description: MAPSPAM crop code. Full labels are provided in the dimension codes asset.
    values:
      - whea
      - rice
      - maiz
      - barl
      - mill
      - pmil
      - sorg
      - ocer
      - pota
      - swpo
      - yams
      - cass
      - orts
      - bean
      - chic
      - cowp
      - pige
      - lent
      - opul
      - soyb
      - grou
      - cnut
      - oilp
      - sunf
      - rape
      - sesa
      - ooil
      - sugc
      - sugb
      - cott
      - ofib
      - coff
      - rcof
      - coco
      - teas
      - toba
      - bana
      - plnt
      - citr
      - trof
      - temf
      - toma
      - onio
      - vege
      - rubb
      - rest

  - name: technology
    type: technology
    description:
      MAPSPAM production system code. Full labels are provided in the dimension codes asset.
    values: [all, irrigated, rainfed]

variables:
  - name: physical_area
    description: Physical crop area allocated to each grid cell.
    data_type: float32
    unit: ha
  - name: harvested_area
    description: Harvested crop area allocated to each grid cell.
    data_type: float32
    unit: ha
  - name: production
    description: Crop production allocated to each grid cell.
    data_type: float32
    unit: t
    note: Absolute quantity; regional summaries should sum values across cells.
  - name: yield
    description: Crop yield for each grid cell.
    data_type: float32
    unit: t ha-1
    note: >
      Relative quantity; do not sum yield values across grid cells. Regional summaries should use a
      weighted mean with harvested_area as the weight.

cdh:
  domain: [agricultural-production]
  use_cases:
    - proposal preparation
    - adaptation planning
  not_recommended_for:
    - use: field-scale farm management
      reason: the grid is too coarse for field-scale operational decisions.
      use_instead: local survey or administrative production data.

commodities:
